# Dependency version updates. Security updates are additionally driven by
# GitHub Dependabot alerts (enable "Dependabot security updates" in repo
# Settings → Code security) — that toggle is what auto-PRs advisory fixes like
# the sanitize-html CVSS 9.3 that this audit caught.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk bumps into one PR to keep review load sane for a solo op.
      minor-and-patch:
        update-types: ["minor", "patch"]
    # Majors on the money path (stripe) get their own PR so they're reviewed
    # deliberately with a checkout smoke test — never auto-batched.
    ignore:
      # Suppress recurring major bumps that break the build and keep getting
      # closed. typescript@7 is the Go-native compiler rewrite (huge breaking
      # change); @types/node@26 jumps ahead of our Node runtime; eslint@10
      # removed the context.getFilename() rule API, which the eslint-plugin-react
      # bundled in the latest eslint-config-next still calls (hard crash — closed
      # #29). Minor/patch updates for all three still flow. Remove an entry to
      # intentionally take the major later.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
